<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Səyahət Bileti</title>

<style>
body{
    font-family: Arial;
    margin:0;
}

header{
    background:#0077b9;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:300px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#0077b6;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#023e8a;
}
</style>

</head>

<body>

<header>
<h1>Ucuz səyahətin ünvanı</h1>
<p>Ucuz uçuş biletləri üçün bron edin</p>
</header>




<div class="container">


<form>

<label><b><font color="#0077b9">Haradan:</label>
<select>
<option>Bakı</option>
<option>İstanbul</option>
<option>London</option>
<option>Dubai</option>
</select>

<label>Hara:</label>
<select>
<option>İstanbul</option>
<option>Paris</option>
<option>Berlin</option>
<option>Roma</option>
</select>

<label>Tarix:</label>
<input type="date">

<label>Sərnişin sayı:</label>
<input type="number" min="1" max="10" width="300px">

<button><b>Bilet Axtar</b></button> 

</form>

</div>


<img src="https://avatars.mds.yandex.net/i?id=2a8ba212627f27bf65d18c3c832a6739eb4987b3-4566223-images-thumbs&n=13" width="1000" height="400">>
<br>



<div class="post">

<div class="sekil">
<img src="https://avatars.mds.yandex.net/i?id=d4781d54c3ba5857ec4c7776df4fcd56f07825ce-7178390-images-thumbs&n=13">
</div>

<div class="melumat">
<h2>✈️ Səyahət Endirimi</h2>
<p class="endirim">30% ENDİRİM</p>
<p>Bakı – Praqa uçuş biletləri</p>
<button>Bilet Al</button>
</div>

</div>

</body>
</html>
